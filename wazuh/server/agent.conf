<!-- Wazuh Agent Configuration - HW-Detector wodle -->
<!-- Bu konfiguratsiyani Wazuh Manager da agent.conf ga qo'shing -->
<!-- Joylash: /var/ossec/etc/shared/default/agent.conf -->
<!-- Yoki: specific guruh uchun /var/ossec/etc/shared/<group_name>/agent.conf -->

<agent_config os="Windows">

  <!-- HW-Detector skriptini wodle-command orqali ishga tushirish -->
  <wodle name="command">
    <disabled>no</disabled>
    <tag>hw_detector</tag>
    <command>Powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files (x86)\ossec-agent\active-response\bin\HW-Detector-Wazuh.ps1"</command>
    <interval>1h</interval>
    <ignore_output>no</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>120</timeout>
  </wodle>

</agent_config>
